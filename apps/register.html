<!-- dr-nearby/register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr.Nearby - Register</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/forms.css" />
</head>
<body>
  <header>
    <h1>Dr.Nearby</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="user-login.html">Login</a>
    </nav>
  </header>

  <main>
    <section class="form-container">
      <h2>Create Your Account</h2>
      <div id="message"></div>
      <form id="regForm">
        <div class="form-group">
          <label for="username">Username *</label>
          <input type="text" id="username" required minlength="3" maxlength="30" />
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="phone">Phone *</label>
          <input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="10-digit number" />
        </div>
        <div class="form-group">
          <label for="dob">Date of Birth *</label>
          <input type="date" id="dob" required />
        </div>
        <div class="form-group">
          <label for="gender">Gender *</label>
          <select id="gender" required>
            <option value="">-- Select --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group checkbox">
          <input type="checkbox" id="terms" required />
          <label for="terms">
            I accept the <a href="terms.html" target="_blank">Terms & Conditions</a> *
          </label>
        </div>
        <button type="submit">Register</button>
        <p class="form-footer">
          Already have an account? <a href="user-login.html">Login here</a>
        </p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Dr.Nearby</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
