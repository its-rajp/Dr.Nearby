<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile | Dr.Nearby</title>
  <link rel="stylesheet" href="CSS/Style.css" />
  <link rel="stylesheet" href="CSS/doctor-profile.css" />
  <style>
    
    .profile-container {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1rem;
        display: flex;
        gap: 2rem;
        flex-wrap: wrap;
    }
    .profile-sidebar {
        flex: 1;
        min-width: 300px;
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        text-align: center;
    }
    .profile-sidebar img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 1rem;
        border: 4px solid #f0f2f5;
    }
    .profile-main {
        flex: 2;
        min-width: 300px;
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .profile-section {
        margin-bottom: 2rem;
    }
    .profile-section h3 {
        color: #2c3e50;
        border-bottom: 2px solid #3498db;
        padding-bottom: 0.5rem;
        margin-bottom: 1rem;
    }
    .info-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
    }
    .info-item label {
        display: block;
        color: #7f8c8d;
        font-size: 0.9rem;
        margin-bottom: 0.2rem;
    }
    .info-item span {
        font-weight: 500;
        color: #2c3e50;
    }
    .action-buttons {
        margin-top: 1.5rem;
        display: flex;
        gap: 1rem;
        justify-content: center;
    }
    .btn {
        padding: 0.8rem 1.5rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
    }
    .btn-primary {
        background: #3498db;
        color: white;
    }
    .btn-primary:hover { background: #2980b9; }
    .btn-secondary {
        background: #2ecc71;
        color: white;
    }
    .btn-secondary:hover { background: #27ae60; }
    
    .btn-danger {
        background: #e74c3c;
        color: white;
    }
    .btn-danger:hover { background: #c0392b; }

    .info-box {
        background: #f8f9fa;
        padding: 1rem;
        border-radius: 8px;
        border-left: 4px solid #3498db;
        margin-top: 0.5rem;
    }
    .appointment-list {
        list-style: none;
        padding: 0;
    }
    .appointment-list li {
        padding: 0.8rem;
        border-bottom: 1px solid #eee;
    }
    .appointment-list li:last-child { border-bottom: none; }
    
    .loading {
        text-align: center;
        padding: 3rem;
        font-size: 1.2rem;
        color: #7f8c8d;
    }
    .error-msg {
        text-align: center;
        padding: 2rem;
        color: #e74c3c;
        background: #fadbd8;
        border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dr.Nearby</h1>
    <nav>
      <a href="dashboard.html">Home</a>
      <a href="search_doctor.html">Find Doctor</a>
      <a href="#" onclick="history.back()">Back</a>
    </nav>
  </header>

  <main>
    <div id="profile-content">
      <div class="loading">Loading profile...</div>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Dr.Nearby</p>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/common-profile.js"></script>
</body>
</html>
