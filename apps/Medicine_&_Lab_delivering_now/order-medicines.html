
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr.Nearby - Order Medicines</title>
  <link rel="stylesheet" href="../CSS/Style.css" />
  <link rel="stylesheet" href="../CSS/forms.css" />
  <style>
    .medicine-list {
      margin: 1.5rem 0;
    }
    .medicine-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border: 1px solid #eee;
      margin-bottom: 0.5rem;
      background: white;
      border-radius: 6px;
    }
    .cart-summary {
      background: #f8f9fa;
      padding: 1.5rem;
      border-radius: 8px;
      margin-top: 1.5rem;
    }
    .cart-summary h3 {
      margin-bottom: 1rem;
      color: #007bff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dr.Nearby</h1>
    <nav>
      <a href="../dashboard.html">Home</a>
      <a href="../search_doctor.html">Find Doctor</a>
      <a href="order-medicines.html">Order Medicines</a>
      <a href="../Profile.html">My Profile</a>
      <a href="#" onclick="logoutUser(); return false;">Logout</a>
    </nav>
  </header>

  <main>
    <h2>Order Medicines</h2>
    <div id="message"></div>

    <div class="medicine-list">
      <h3>Available Medicines</h3>
      <div id="medicinesContainer">
        <p>Loading medicines...</p>
      </div>
    </div>

    <div class="cart-summary">
      <h3>Order Summary</h3>
      <p>Total Items: <span id="cartCount">0</span></p>
      <p>Total Amount: ₹<span id="cartTotal">0</span></p>
      <button id="checkoutBtn" disabled>Proceed to Checkout</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Dr.Nearby</p>
  </footer>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/medicines.js"></script>
</body>
</html>
