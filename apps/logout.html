<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dr.Nearby - Logged Out</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .logout-container {
      max-width: 600px;
      margin: 100px auto;
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .logout-icon {
      font-size: 4rem;
      color: #28a745;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 5px;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }
    .btn-primary {
      background-color: #007bff;
    }
    .btn-secondary {
      background-color: #6c757d;
    }
  </style>
</head>
<body>
  <header>
    <h1>Dr.Nearby</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="user-login.html">Login</a>
    </nav>
  </header>

  <main>
    <div class="logout-container">
      <div class="logout-icon">✓</div>
      <h2>You have been logged out successfully</h2>
      <p>Thank you for using Dr.Nearby. You can now close this window or log in again.</p>
      <div style="margin-top: 30px;">
        <a href="user-login.html" class="btn btn-primary">Patient Login</a>
        <a href="DOCTOR INTERFACE/doctor-login.html" class="btn btn-primary">Doctor Login</a>
        <a href="Admin_panel/admin-login.html" class="btn btn-secondary">Admin Login</a>
      </div>
      <div style="margin-top: 20px;">
        <a href="index.html" style="color: #007bff; text-decoration: none;">Return to Home Page</a>
      </div>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Dr.Nearby. All rights reserved.</p>
  </footer>
</body>
</html>
