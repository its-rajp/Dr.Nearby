<!-- dr-nearby/doctor-interface/doctor-register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr.Nearby - Doctor Registration</title>
  <link rel="stylesheet" href="../CSS/Style.css" />
  <link rel="stylesheet" href="../CSS/forms.css" />
</head>
<body>
  <header>
    <h1>Dr.Nearby - Doctor Registration</h1>
    <nav>
      <a href="../index.html">Back to Home</a>
      <a href="doctor-login.html">Login</a>
    </nav>
  </header>

  <main>
    <section class="form-container">
      <h2>Become a Verified Doctor</h2>
      <div id="message"></div>
      <form id="doctorRegForm">
        <!-- Personal Info -->
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" required minlength="2" maxlength="50" />
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" required minlength="8" />
          <small>Minimum 8 characters</small>
        </div>
        <div class="form-group">
          <label for="phone">Phone *</label>
          <input type="tel" id="phone" required pattern="[0-9]{10}" placeholder="10-digit mobile number" />
        </div>
        <div class="form-group">
          <label for="dob">Date of Birth *</label>
          <input type="date" id="dob" required />
        </div>
        <div class="form-group">
          <label for="gender">Gender *</label>
          <select id="gender" required>
            <option value="">-- Select --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <!-- Professional Info -->
        <div class="form-group">
          <label for="specialization">Specialization *</label>
          <input type="text" id="specialization" required placeholder="e.g., Cardiology, Dermatology" />
        </div>
        <div class="form-group">
          <label for="hospital">Hospital / Clinic *</label>
          <input type="text" id="hospital" required />
        </div>
        <div class="form-group">
          <label for="address">Address *</label>
          <input type="text" id="address" required placeholder="Street address" />
        </div>
        <div class="form-group">
          <label for="city">City *</label>
          <input type="text" id="city" required />
        </div>
        <div class="form-group">
          <label for="state">State *</label>
          <input type="text" id="state" required />
        </div>
        <div class="form-group">
          <label for="zipCode">ZIP Code</label>
          <input type="text" id="zipCode" placeholder="Optional" />
        </div>
        <div class="form-group">
          <label for="licenseNumber">Medical License Number *</label>
          <input type="text" id="licenseNumber" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="experience">Years of Experience *</label>
          <input type="number" id="experience" min="0" max="60" required />
        </div>
        <div class="form-group">
          <label for="qualification">Qualifications *</label>
          <textarea id="qualification" rows="2" required placeholder="e.g., MBBS, MD, DM"></textarea>
        </div>
        <div class="form-group">
          <label for="languages">Languages Spoken</label>
          <input type="text" id="languages" placeholder="e.g., English, Hindi, Marathi" />
        </div>

        <!-- Terms -->
        <div class="form-group checkbox">
          <input type="checkbox" id="terms" required />
          <label for="terms">
            I accept the <a href="../terms.html" target="_blank">Terms & Conditions</a> and confirm that all information is accurate. *
          </label>
        </div>

        <button type="submit">Register as Doctor</button>
        <p class="form-footer">
          Already have an account? <a href="doctor-login.html">Login here</a>
        </p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Dr.Nearby</p>
  </footer>

  <script src="../js/config.js"></script>
  <script>
    
    console.log('API_BASE_URL:', typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : 'NOT FOUND');
    console.log('window.API_BASE_URL:', window.API_BASE_URL || 'NOT FOUND');
  </script>
  <script src="../js/doctor_portal.js"></script>
  <script>
    
    window.addEventListener('load', () => {
      console.log('Page loaded, initializing registration form...');
      console.log('registerDoctor function:', typeof registerDoctor);
      console.log('showMessage function:', typeof showMessage);
      
      
      setTimeout(() => {
        initRegistrationForm();
      }, 200);
    });

    function initRegistrationForm() {
      const form = document.getElementById('doctorRegForm');
      if (!form) return;

      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        
        if (!document.getElementById('terms').checked) {
          if (typeof showMessage !== 'undefined') {
            showMessage('Please accept the Terms & Conditions.', 'error');
          } else {
            alert('Please accept the Terms & Conditions.');
          }
          return;
        }

        const experienceValue = document.getElementById('experience').value;
        const languagesValue = document.getElementById('languages').value.trim();
        
        const doctorData = {
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
          phone: document.getElementById('phone').value.trim(),
          dob: document.getElementById('dob').value,
          gender: document.getElementById('gender').value,
          specialization: document.getElementById('specialization').value.trim(),
          hospital: document.getElementById('hospital').value.trim(),
          address: document.getElementById('address').value.trim(),
          city: document.getElementById('city').value.trim(),
          state: document.getElementById('state').value.trim(),
          zipCode: document.getElementById('zipCode').value.trim() || '',
          licenseNumber: document.getElementById('licenseNumber').value.trim(),
          experience: parseInt(experienceValue, 10) || 0,
          qualification: document.getElementById('qualification').value.trim(),
          languages: languagesValue ? (languagesValue.includes(',') ? languagesValue.split(',').map(l => l.trim()) : [languagesValue]) : []
        };
        
        console.log('Prepared doctor data:', { ...doctorData, password: '***' });

        
        const requiredFields = {
          name: doctorData.name,
          email: doctorData.email,
          password: doctorData.password,
          phone: doctorData.phone,
          dob: doctorData.dob,
          gender: doctorData.gender,
          specialization: doctorData.specialization,
          hospital: doctorData.hospital,
          address: doctorData.address,
          city: doctorData.city,
          state: doctorData.state,
          licenseNumber: doctorData.licenseNumber,
          experience: doctorData.experience,
          qualification: doctorData.qualification
        };
        
        const missingFields = Object.entries(requiredFields)
          .filter(([key, value]) => !value || (typeof value === 'string' && value.trim() === ''))
          .map(([key]) => key);
        
        if (missingFields.length > 0) {
          const errorMsg = `Please fill all required fields. Missing: ${missingFields.join(', ')}`;
          if (typeof showMessage !== 'undefined') {
            showMessage(errorMsg, 'error');
          } else {
            alert(errorMsg);
          }
          return;
        }
        
        
        if (isNaN(doctorData.experience) || doctorData.experience < 0) {
          const errorMsg = 'Experience must be a valid number (0 or greater).';
          if (typeof showMessage !== 'undefined') {
            showMessage(errorMsg, 'error');
          } else {
            alert(errorMsg);
          }
          return;
        }

        
        if (typeof registerDoctor === 'undefined') {
          const msg = typeof showMessage !== 'undefined' ? showMessage : alert;
          msg('Registration function not loaded. Please refresh the page.', 'error');
          console.error('registerDoctor function not found');
          return;
        }

        
        const msgDiv = document.getElementById('message');
        if (msgDiv) {
          msgDiv.textContent = 'Registering...';
          msgDiv.style.color = 'blue';
          msgDiv.style.display = 'block';
        }

        
        try {
          console.log('Calling registerDoctor with data:', { ...doctorData, password: '***' });
          const result = await registerDoctor(doctorData);
          console.log('Registration result:', result);
          
          if (result && result.success) {
            const successMsg = result.message || 'Registration successful! Redirecting to login...';
            if (typeof showMessage !== 'undefined') {
              showMessage(successMsg, 'success');
            } else if (msgDiv) {
              msgDiv.textContent = successMsg;
              msgDiv.style.color = 'green';
              msgDiv.style.backgroundColor = '#d4edda';
              msgDiv.style.display = 'block';
            }
            setTimeout(() => {
              window.location.href = 'doctor-login.html';
            }, 1500);
          } else {
            const errorMsg = result?.message || 'Registration failed. Please try again.';
            console.error('Registration failed:', errorMsg);
            if (typeof showMessage !== 'undefined') {
              showMessage(errorMsg, 'error');
            } else if (msgDiv) {
              msgDiv.textContent = errorMsg;
              msgDiv.style.color = 'red';
              msgDiv.style.backgroundColor = '#f8d7da';
              msgDiv.style.display = 'block';
            } else {
              alert(errorMsg);
            }
          }
        } catch (error) {
          console.error('Registration error:', error);
          const errorMsg = error.message || 'Registration failed. Please try again.';
          if (typeof showMessage !== 'undefined') {
            showMessage(errorMsg, 'error');
          } else if (msgDiv) {
            msgDiv.textContent = errorMsg;
            msgDiv.style.color = 'red';
            msgDiv.style.backgroundColor = '#f8d7da';
            msgDiv.style.display = 'block';
          } else {
            alert(errorMsg);
          }
        }
      });
    }
  </script>
</body>
</html>
